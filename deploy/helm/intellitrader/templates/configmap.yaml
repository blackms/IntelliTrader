{{- if not .Values.config.existingConfigMap }}
{{- if .Values.config.files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "intellitrader.fullname" . }}-config
  labels:
    {{- include "intellitrader.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config.files }}
  {{ $key }}: |
    {{- $value | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
