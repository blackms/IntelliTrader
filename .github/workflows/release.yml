name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION: IntelliTrader.sln

jobs:
  build:
    name: Build (${{ matrix.runtime }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - runtime: linux-x64
            artifact_ext: tar.gz
          - runtime: win-x64
            artifact_ext: zip
          - runtime: osx-x64
            artifact_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-build --logger "console;verbosity=minimal"

      - name: Publish
        run: >
          dotnet publish IntelliTrader/IntelliTrader.csproj
          --configuration ${{ env.CONFIGURATION }}
          --runtime ${{ matrix.runtime }}
          --self-contained false
          --output ./publish/${{ matrix.runtime }}
          /p:Version=${GITHUB_REF_NAME#v}

      - name: Package artifact (tar.gz)
        if: matrix.artifact_ext == 'tar.gz'
        run: |
          mkdir -p ./artifacts
          tar -czf ./artifacts/IntelliTrader-${GITHUB_REF_NAME}-${{ matrix.runtime }}.tar.gz -C ./publish/${{ matrix.runtime }} .

      - name: Package artifact (zip)
        if: matrix.artifact_ext == 'zip'
        run: |
          mkdir -p ./artifacts
          (cd ./publish/${{ matrix.runtime }} && zip -r ../../artifacts/IntelliTrader-${GITHUB_REF_NAME}-${{ matrix.runtime }}.zip .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: ./artifacts/*
          retention-days: 1

  docker:
    name: Docker Image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.tar.gz
            ./artifacts/*.zip
